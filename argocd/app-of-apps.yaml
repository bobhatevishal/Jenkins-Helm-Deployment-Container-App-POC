apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snaplink-master
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/bobhatevishal/Helm-deployment-app.git"
    targetRevision: main
    path: argocd/dev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
