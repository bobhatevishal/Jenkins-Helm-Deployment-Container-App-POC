{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.nameOverride | default .Release.Name }}-ingress
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/health-probe-path: {{ .Values.healthPath | default "/" | quote }}
spec:
  tls:
  - hosts:
    - {{ .Values.ingress.domain | quote }}
    secretName: snaplink-tls-secret
  rules:
  - host: {{ .Values.ingress.domain | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.nameOverride | default .Release.Name }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
