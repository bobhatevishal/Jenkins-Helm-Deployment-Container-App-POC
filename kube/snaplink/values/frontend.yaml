nameOverride: "frontend"
replicaCount: 1
global:
  imageRegistry: <registry>

image:
  repository: <repo_name>
  tag: <image_tag>

service:
  port: 80

env:
  - name: NODE_ENV
    value: "production"
  - name: API_URL
    value: "http://api.snaplink.com"

ingress:
  enabled: true
  domain: "snaplink-qa.com"
  tlsSecret: "snaplink-tls-secret"
healthPath: "/"
