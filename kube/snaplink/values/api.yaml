nameOverride: "api"
namespace: "snaplink-ns"
global:
  imageRegistry: <registry>

image:
  repository: <repo_name>
  tag: <image_tag>

service:
  port: 5000

env:
  - name: DB_USER
    value: <DB_USER>
  - name: DB_PASS
    value: <DB_PASS>
  - name: DB_HOST
    value: <DB_HOST>
  - name: DB_NAME
    value: "urlshort"
  - name: DB_PORT
    value: "5432"
  - name: REDIS_URL
    value: "redis://redis:6379/0"
healthPath: "/api/health"
